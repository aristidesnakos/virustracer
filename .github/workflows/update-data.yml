name: Update Outbreak Data

on:
  schedule:
    # Run daily at 08:00 UTC — captures overnight news cycle
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch feeds and update live data
        env:
          # OpenRouter key (uses DeepSeek V4 Flash for cheap summarization)
          # Set this in GitHub repo Settings → Secrets → OPENROUTER_API_KEY
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/fetch-feeds.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: update outbreak feed [skip ci]"
            git push
          fi
